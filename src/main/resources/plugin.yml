main: xyz.neontonight.auction.NeonAuctionPlugin
name: NeonAuction
prefix: "Neon Auction"
version: '${version}'
description: Fixed-price auction house with MongoDB persistence and Redis cross-server sync.
author: NeonTonight
api-version: '1.21'
folia-supported: true
softdepend: [Vault, VaultUnlocked, EconomyProvider]
commands:
  ah:
    description: Opens the auction house.
    aliases: [auction, auctions]
    usage: /ah
permissions:
  neonauction.use:
    description: Allows opening and buying from the auction house.
    default: true
  neonauction.sell:
    description: Allows listing items for sale.
    default: true
  neonauction.reload:
    description: Allows reloading the auction configuration.
    default: op
